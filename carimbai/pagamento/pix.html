<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Página de Pagamento PIX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/form.css">
  <link rel="stylesheet" href="pix.css">
</head>

<body>
  <div class="container">
    <div id="header"></div>

  <div class="pix-card">

    <h1>Pagamento via PIX</h1>

    <p class="sub">
      Copie o código abaixo e pague no app do seu banco.
    </p>

    <div id="loading" class="loading">
      Gerando PIX...
    </div>

    <div id="conteudoPix" style="display:none;">

      <button id="btnCopiar" class="btn btn-primary">
        Copiar código PIX
      </button>

      <textarea
        id="pixCode"
        class="pix-code"
        readonly
      ></textarea>

      <p class="small">Ou escaneie o QR Code</p>

      <button id="btnQr" class="btn btn-secondary">
        Ver QR Code
      </button>

      <div id="qrBox" class="qr-box">
        <img id="qrImg" alt="QR Code PIX">
      </div>

      <div id="status" class="status">
        Aguardando pagamento...
      </div>

    </div>

  </div>
  <div id="footer"></div>

</div>

<script type="module" src="pix.js"></script>
<script src="../../carimbai/js/components.js"></script>
<script>
    loadHeader({
        title: "PÁGINA DE PAGAMENTO",
        description: "Finalize seu pedido realizando o pagamento",
        extra: `
            <a class="btn-secondary" href="/carimbai/links">
                📲 Links de Contato
            </a>
        `
    });
</script>

</body>
</html>
