<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Produto</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .produto-img img {
      width: 100%;
      border-radius: 10px;
    }

    .produto-info h1 {
      margin-bottom: 10px;
    }

    .preco {
      font-size: 24px;
      color: #2e7d32;
      font-weight: bold;
      margin: 15px 0;
    }

    .detalhes {
      margin-top: 20px;
    }

    .detalhes p {
      margin: 5px 0;
    }

    .btn-comprar {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .btn-comprar:hover {
      background: #0056b3;
    }

    @media(max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container" id="produto-container">
  <p>Carregando produto...</p>
</div>

<script src="script.js"></script>

</body>
</html>
