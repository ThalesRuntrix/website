<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/carimbai/css/base.css">
    <link rel="stylesheet" href="/carimbai/css/grid.css">
    <link rel="stylesheet" href="style.css">

<body>

    <div class="container">

        <!-- HEADER -->
        <div id="header"></div>
        
        <div class="pix-box">

        <div class="info-pix">

                <span class="label">Chave Pix</span>
                <span class="value destaque">atendimento.carimbai@gmail.com</span>
            </div>

            <div class="pix-item">
                <span class="label">Tipo</span>
                <span class="value">E-mail</span>
            </div>

            <div class="pix-item">
                <span class="label">Recebedor</span>
                <span class="value">Thales Santos Ribeiro</span>
            </div>

            <div class="pix-item">
                <span class="label">CPF</span>
                <span class="value">***.207.448-**</span>
            </div>

            <div class="pix-item">
                <span class="label">Instituição</span>
                <span class="value">Mercado Pago</span>
            </div>
        </div>

        <!-- CTA FINAL -->
        <div id="cta"></div>

        <!-- BREAD CRUMB -->
        <section class="bread-crumb">
            <a class="btn-tertiary" href="/carimbai/links/index.html">
                ← Voltar
            </a>
        </section>        

        <!-- FOOTER -->
        <div id="footer"></div>

    </div>

    <script src="script.js"></script>
    <script src="/carimbai/js/components.js"></script>
    <script>
        loadHeader({
            title: "Pagamento via PIX",
            description: "Copie a chave abaixo",
            extra: `
                <button class="btn-copy" onclick="copyPix()">
                    📋 Copiar chave PIX
                </button>            
            `
        });
    </script>

</body>

</html>
