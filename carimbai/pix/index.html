<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Carimbai | PIX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
</head>

<body>

    <div class="container">
        <!-- HERO COM IMAGEM -->
        <section class="hero">
            <div class="hero-overlay">

                <!-- LOGO -->
                <div class="logo-container">
                    <img src="../logo.png" alt="Carimbai Logo">
                </div>
                <h1>Pagamento via PIX</h1>
                <h2>Copie a chave abaixo</h2>
                
                <!-- BOTÃO COPIAR -->
                <button class="btn-copy" onclick="copyPix()">
                    📋 Copiar chave PIX
                </button>

            </div>
        </section>

        <div class="pix-box">
            <!-- CHAVE PIX -->
            <div class="pix-key" id="pixKey" hidden="true">atendimento.carimbai@gmail.com</div> 
        </div>   

        <div class="info-pix">
            <div class="pix-item">
                <span class="label">Chave Pix</span>
                <span class="value destaque">atendimento.carimbai@gmail.com</span>
            </div>

            <div class="pix-item">
                <span class="label">Tipo</span>
                <span class="value">E-mail</span>
            </div>

            <div class="pix-item">
                <span class="label">Recebedor</span>
                <span class="value">Thales Santos Ribeiro</span>
            </div>

            <div class="pix-item">
                <span class="label">CPF</span>
                <span class="value">***.207.448-**</span>
            </div>

            <div class="pix-item">
                <span class="label">Instituição</span>
                <span class="value">Mercado Pago</span>
            </div>
        </div>


        <section class="actions">             
            <section class="cta">
            <a class="btn-primary" href="../links">
                🚀 Entrar em contato agora
            </a>
        </section>         

        <!-- FOOTER -->
        <footer class="footer">© 2005 Carimbai</footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
