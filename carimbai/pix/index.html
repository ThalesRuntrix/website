<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Carimbai | PIX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>

    <div class="container">
        <!-- HERO COM IMAGEM -->
        <section class="hero">
            <div class="hero-overlay">

                <!-- LOGO -->
                <div class="logo-container">
                    <img src="../logo.png" alt="Carimbai Logo">
                </div>
                <h1>Pagamento via PIX</h1>
                <p>Ecaneie o QR code ou copie a chave abaixo</p>
            </div>
        </section>

        <div class="pix-box">

            <!-- QR CODE -->
            <img src="qrcodepix.png" alt="QR Code PIX" class="qr">

            <!-- CHAVE PIX -->
            <div class="pix-key" id="pixKey">
            atendimento.carimbai@gmail.com
            </div>

            <!-- BOTÃO COPIAR -->
            <button class="btn btn-copy" onclick="copyPix()">
                📋 Copiar chave PIX
            </button>          

        </div>

        <section class="actions">             
            <section class="cta">
            <a class="btn-primary" href="../links">
                🚀 Entrar em contato agora
            </a>
        </section>         

        <!-- FOOTER -->
        <footer class="footer">© 2005 Carimbai</footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
