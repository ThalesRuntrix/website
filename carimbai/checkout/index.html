<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Finalizar Pedido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/form.css">
  <link rel="stylesheet" href="../css/form.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div id="header"></div>

  <section class="form-box">

    <form id="pedido-form">
      <p>Você está comprando: <strong id="produto-nome"></strong></p>

        <h3>👤 Dados do Cliente</h3>
        <input type="text" id="nome" placeholder="Nome completo" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="cpf" placeholder="CPF" required>

        <h3>🚚 Formas de Entrega</h3>
        <select id="entrega" required>
            <option value="">Selecione</option>
            <option value="retirada">Retirar na loja</option>
            <option value="frete">Entregar no meu Endereço</option>
        </select>

        <div id="endereco-box" style="display:none;">
          <h3>📍 Endereço de Entrega</h3>

          <div class="form-grid">

            <input type="text" id="cep" placeholder="CEP">
            <span id="cep-erro" class="input-msg-erro" style="display:none;">
              CEP inválido
            </span>

            <input type="text" id="rua" placeholder="Rua">

            <div class="form-row">
              <input type="text" id="numero" placeholder="Número">
              <input type="text" id="complemento" placeholder="Complemento">
            </div>

            <input type="text" id="bairro" placeholder="Bairro">

            <div class="form-row">
              <input type="text" id="cidade" placeholder="Cidade">
              <input type="text" id="estado" placeholder="Estado (UF)">
            </div>

          </div>
        </div>
        
        <div id="frete-info" style="display:none;">
          <p><strong>Escolha o frete:</strong></p>

          <div id="frete-opcoes" class="frete-grid"></div>
        </div>

        <h3>💳 Pagamento</h3>
        <select id="pagamento" required>
            <option value="">Selecione</option>
            <option value="pix">PIX</option>
            <option value="Cartão">Cartão</option>
        </select>

        <div class="resumo-pedido">
          <p>Produto: <span id="resumo-produto">R$ 0,00</span></p>
          <p>Frete: <span id="resumo-frete">R$ 0,00</span></p>
          <p>Desconto PIX: <span id="resumo-desconto">R$ 0,00</span></p>

          <h3>Total: <span id="resumo-total">R$ 0,00</span></h3>
        </div>

      <button type="submit" class="btn-primary">
        🚀 Enviar Pedido Agora
      </button>

    </form>

  </section>

  <div id="footer"></div>

</div>

<!--<script src="script.js"></script>-->
<script type="module" src="main.js"></script>
<script src="/carimbai/js/components.js"></script>
<script>
    loadHeader({
        title: "PÁGINA DE PEDIDO",
        description: "Finalize seu pedido preenchendo os campos abaixo",
        extra: `
            <a class="btn-secondary" href="/carimbai/links">
                📲 Links de Contato
            </a>
        `
    });
</script>

</body>
</html>
