<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Finalizar Pedido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/form.css">
</head>

<body>

<div class="container">

  <div id="header"></div>

  <section class="form-box">

    <form id="pedido-form">
      <p>Você está comprando: <strong id="produto-nome"></strong></p>

        <h3>📌 Dados do Cliente</h3>
        <input type="text" id="nome" placeholder="Nome completo" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="cpf" placeholder="CPF" required>

        <h3>📍 Endereço</h3>
        <input type="text" id="rua" placeholder="Rua" required>
        <input type="text" id="numero" placeholder="Número" required>
        <input type="text" id="complemento" placeholder="Complemento">
        <input type="text" id="bairro" placeholder="Bairro" required>
        <input type="text" id="cidade" placeholder="Cidade" required>
        <input type="text" id="estado" placeholder="Estado (UF)" required>
        <input type="text" id="cep" placeholder="CEP" required>

        <h3>🚚 Entrega</h3>
        <select id="entrega" required>
            <option value="">Selecione</option>
            <option value="Retirar na loja">Retirar na loja</option>
            <option value="Entrega (frete)">Entrega (frete)</option>
        </select>

        <h3>💳 Pagamento</h3>
        <select id="pagamento" required>
            <option value="">Selecione</option>
            <option value="PIX">PIX</option>
            <option value="Cartão">Cartão</option>
        </select>

      <button type="submit" class="btn-primary">
        🚀 Enviar Pedido Agora
      </button>

    </form>

  </section>

  <div id="footer"></div>

</div>

<script src="script.js"></script>
<script src="/carimbai/js/components.js"></script>
<script>
    loadHeader({
        title: "PÁGINA DE PEDIDO",
        description: "Finalize seu pedido preenchendo os campos abaixo",
        extra: `
            <a class="btn-secondary" href="/carimbai/links">
                📲 Links de Contato
            </a>
        `
    });
</script>

</body>
</html>
