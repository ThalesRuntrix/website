<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Finalizar Pedido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/form.css">
</head>

<body>

<div class="container">

  <div id="header"></div>

  <section class="form-box">

    <h2>Finalizar Pedido</h2>
    <p>Você está comprando: <strong id="produto-nome"></strong></p>

    <form id="pedido-form">

      <input type="text" name="nome" placeholder="Seu nome" required>
      <input type="email" name="email" placeholder="Seu email" required>
      <input type="text" name="cpf" placeholder="CPF" required>
      <input type="text" name="endereco" placeholder="Endereço completo">

      <label>Entrega:</label>
      <select name="entrega">
        <option value="retirar">Retirar na loja</option>
        <option value="frete">Entrega (frete)</option>
      </select>

      <label>Pagamento:</label>
      <select name="pagamento">
        <option value="pix">PIX</option>
        <option value="cartao">Cartão</option>
      </select>

      <button type="submit" class="btn-primary">
        🚀 Enviar Pedido Agora
      </button>

    </form>

  </section>

  <div id="footer"></div>

</div>

<script src="script.js"></script>
<script src="/carimbai/js/components.js"></script>

</body>
</html>
